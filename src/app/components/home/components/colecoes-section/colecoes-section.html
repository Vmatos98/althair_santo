<section id="colecoes" class="section min-h-screen flex items-center justify-center bg-gray-50/95 py-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="text-3xl md:text-4xl font-serif tracking-wider mb-4">Coleções</h2>
    <div class="w-20 h-0.5 bg-black mx-auto mb-4"></div>
    <p class="text-gray-600 max-w-2xl mx-auto mb-12">Descubra as últimas criações de Althair Santo, cada peça conta
      uma história única, combinando tradição e inovação.</p>

    <div class="flex justify-center mb-12">
      <div class="text-center cursor-pointer w-full md:w-80" (click)="onNavegarParaGaleria()">
        <div class="group relative overflow-hidden rounded-sm">
          <img src="https://i.postimg.cc/VL0KfpmW/altair-santo-befw23-011.jpg" alt="Coleção Desfile 2023"
            class="w-full h-80 object-cover transition duration-500 group-hover:scale-105">
        </div>
        <h3 class="text-xl font-serif mt-4 mb-2">Brasil Eco Fashion Week 2023</h3>
        <p class="text-sm text-gray-600 px-4">Leveza e sustentabilidade</p>
      </div>
    </div>

    <div class="mt-12">
      <button (click)="onNavegarParaColecoes()"
        class="inline-block border border-black px-8 py-3 hover:bg-black hover:text-white transition duration-300 cursor-pointer">Ver
        Todas as Coleções</button>
    </div>
  </div>
</section>
