<section id="videos" class="section min-h-screen flex items-center justify-center bg-white/95 py-12 w-full">
    <div class="max-w-[1400px] w-full mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <h2 class="text-3xl md:text-4xl font-serif tracking-wider mb-4">Moda em Movimento</h2>
        <div class="w-20 h-0.5 bg-black mx-auto mb-4"></div>
        <p class="text-gray-600 max-w-2xl mx-auto mb-12">Assista aos desfiles, bastidores e ao processo criativo por
            trás de cada peça. Uma imersão no universo da marca, onde cada detalhe é cuidadosamente planejado e
            executado.</p>
        <div class="max-w-4xl mx-auto">
            <div class="aspect-video rounded-sm shadow-lg overflow-hidden video">
                <iframe class="w-full h-full"
                    src="https://www.youtube.com/embed/D8mP5jpEbLU?si=9N0ETOZQJcAfJrte&amp;start=225" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen title="Vídeo de moda - Desfile Althair Santo"></iframe>
            </div>
        </div>
        <div class="mt-12">
            <button (click)="onNavegarParaVideos()"
                class="inline-block border border-black bg-transparent text-black px-8 py-3 focus:outline-none btn-ver-mais">Ver
                Mais Vídeos</button>
        </div>
    </div>
</section>
